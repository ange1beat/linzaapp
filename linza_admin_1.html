<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linza Detector · Администратор</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap');

[data-theme="dark"]{
  --bg:#08080e;--bg2:#0b0b14;--sf:rgba(255,255,255,0.028);--sfh:rgba(255,255,255,0.05);
  --sb:rgba(12,12,20,0.92);--hd:rgba(12,12,20,0.5);
  --bd:rgba(255,255,255,0.045);--bh:rgba(255,255,255,0.09);
  --t:#c0c4dc;--t2:#5c6490;--t3:#383e5c;--th:#dce0f4;
  --bl:#7ca6ee;--gr:#30d89c;--rd:#ec6080;--yl:#dcc040;--pp:#9888d8;--or:#d88050;--cy:#40c8dc;
  --ib:rgba(255,255,255,0.015);--glow:rgba(124,166,238,0.05);
  --card-s:0 1px 8px rgba(0,0,0,0.1);
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#f0f1f6;--bg2:#e6e8f0;--sf:rgba(255,255,255,0.65);--sfh:rgba(255,255,255,0.85);
  --sb:rgba(255,255,255,0.75);--hd:rgba(255,255,255,0.55);
  --bd:rgba(0,0,0,0.055);--bh:rgba(0,0,0,0.09);
  --t:#2a2e48;--t2:#585e84;--t3:#8890b0;--th:#1a1e34;
  --bl:#3464c8;--gr:#0cac70;--rd:#dc3858;--yl:#c89808;--pp:#7434e4;--or:#d85c1c;--cy:#0888ac;
  --ib:rgba(0,0,0,0.018);--glow:rgba(52,100,200,0.05);
  --card-s:0 1px 4px rgba(0,0,0,0.03);
  color-scheme:light;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);font-size:13px;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
.app{display:flex;height:100vh;opacity:0;animation:fi .4s .05s both;overflow:hidden;}
@keyframes fi{to{opacity:1}}

/* ═══ SIDEBAR ═══ */
.side{width:228px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;z-index:10;}
.s-brand{padding:28px 20px 24px;border-bottom:1px solid var(--bd);}
.s-brand svg{height:36px;width:auto;opacity:.9;display:block;}
.s-brand-sub{font-size:9.5px;font-weight:500;color:var(--t3);letter-spacing:1.8px;text-transform:uppercase;margin-top:10px;}
.s-org{margin:16px 12px 10px;padding:16px 18px;border-radius:14px;background:var(--sf);border:1px solid var(--bd);}
.s-org-n{font-size:13px;font-weight:700;color:var(--th);letter-spacing:-.01em;}
.s-org-m{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.5;}

.s-nav{flex:1;padding:6px 12px;overflow-y:auto;}
.s-g{margin-bottom:24px;}
.s-g-t{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.8px;padding:8px 12px 6px;opacity:.5;}
.s-lk{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;cursor:pointer;transition:all .22s;font-size:13px;color:var(--t2);font-weight:450;border:1px solid transparent;margin-bottom:2px;}
.s-lk:hover{background:var(--sf);color:var(--t);}
.s-lk.on{background:rgba(124,166,238,0.04);border-color:rgba(124,166,238,0.08);color:var(--bl);font-weight:600;}
.s-lk .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;opacity:.35;}
.s-lk.on .dot{opacity:1;}

/* ═══ TOPBAR ═══ */
.top{padding:0 36px;display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--bd);background:var(--bg2);height:60px;flex-shrink:0;z-index:5;}
.top-left{flex:1;}
.top-right{display:flex;align-items:center;gap:12px;}
.top-user{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 6px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);}
.top-av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;background:linear-gradient(135deg,#44cce0,#30a8c0);}
.top-uname{font-size:12px;font-weight:500;color:var(--th);}
.top-urole{font-size:10px;color:var(--t3);margin-top:1px;}
.top-theme{width:32px;height:32px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t3);transition:all .2s;}
.top-theme:hover{border-color:var(--bh);color:var(--t);}

/* ═══ MAIN ═══ */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.pg{flex:1;overflow-y:auto;overflow-x:hidden;padding:36px clamp(24px,4vw,44px) 64px;}

/* ═══ PIPELINE ZONE ═══ */
.steps{display:flex;align-items:center;gap:0;margin:-36px calc(-1 * clamp(24px,4vw,44px)) 36px;padding:28px clamp(24px,4vw,44px) 24px;flex-wrap:wrap;overflow:hidden;background:rgba(124,166,238,0.012);border-bottom:1px solid rgba(124,166,238,0.06);position:relative;}
.steps::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--bl),transparent);opacity:.12;}
.step{display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .22s;padding:11px 16px;border-radius:12px;flex:1;min-width:120px;border:1px solid transparent;}
.step:hover{background:rgba(124,166,238,0.06);border-color:rgba(124,166,238,0.1);}
.step:hover .step-num{border-color:var(--bl);color:var(--bl);}
.step:hover .step-name{color:var(--th);}
.step.on{background:rgba(124,166,238,0.08);border-color:rgba(124,166,238,0.12);}
.step-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1.5px solid var(--bd);color:var(--t3);transition:all .22s;flex-shrink:0;}
.step.on .step-num{background:var(--bl);border-color:var(--bl);color:#fff;box-shadow:0 2px 12px rgba(124,166,238,0.2);}
.step.done .step-num{background:var(--gr);border-color:var(--gr);color:#fff;}
.step-info{flex:1;min-width:0;}
.step-name{font-size:12.5px;font-weight:600;color:var(--t2);transition:color .2s;}
.step.on .step-name{color:var(--th);}
.step.done .step-name{color:var(--gr);}
.step-desc{font-size:10px;color:var(--t3);margin-top:2px;}
.step-line{width:20px;height:1px;background:var(--bd);flex-shrink:0;}

/* ═══ SECTION ═══ */
.section{margin-bottom:36px;animation:su .4s cubic-bezier(.22,1,.36,1) both;}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sec-title{font-size:20px;font-weight:700;color:var(--th);letter-spacing:-.03em;margin-bottom:8px;}
.sec-desc{font-size:12.5px;color:var(--t2);margin-bottom:28px;line-height:1.7;max-width:680px;font-weight:400;}

/* ═══ CARDS ═══ */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:24px 26px;margin-bottom:14px;box-shadow:var(--card-s);transition:all .25s;}
.card:hover{border-color:var(--bh);}

/* ═══ PROFILE SELECTOR ═══ */
.profiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px;}
.profile{padding:20px 16px;border-radius:14px;background:var(--ib);border:2px solid var(--bd);cursor:pointer;transition:all .28s;text-align:center;position:relative;overflow:hidden;}
.profile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.profile:hover{border-color:var(--bh);background:var(--sf);transform:translateY(-1px);}
.profile.on{background:var(--glow);transform:translateY(-2px);}
.profile.on::before{opacity:1;}
.profile-check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:6px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .2s;}
.profile.on .profile-check{background:var(--gr);border-color:var(--gr);color:#fff;}
.profile-icon{font-size:28px;margin-bottom:10px;display:block;line-height:1;}
.profile-name{font-size:12px;font-weight:600;color:var(--th);margin-bottom:4px;}
.profile-desc{font-size:9.5px;color:var(--t3);line-height:1.45;}

/* ═══ CONTENT TYPES ═══ */
.ct-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.ct-item{padding:12px 14px;border-radius:12px;border:1.5px solid var(--bd);background:var(--ib);cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:10px;flex:1 1 130px;min-width:120px;}
.ct-item:hover{border-color:var(--bh);background:var(--sf);}
.ct-item.on{background:var(--glow);}
.ct-mark{width:20px;height:20px;border-radius:7px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .2s;flex-shrink:0;}
.ct-item.on .ct-mark{border-color:var(--gr);background:var(--gr);color:#fff;}
.ct-symbol{font-size:11px;font-weight:700;width:18px;text-align:center;flex-shrink:0;}
.ct-label{font-size:11px;font-weight:500;color:var(--th);overflow-wrap:break-word;word-break:break-word;min-width:0;}

/* ═══ COMPLIANCE PLATFORM SELECTOR ═══ */
.platforms{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:24px;}
.platform{padding:16px;border-radius:14px;background:var(--ib);border:1.5px solid var(--bd);cursor:pointer;transition:all .25s;position:relative;}
.platform:hover{border-color:var(--bh);background:var(--sf);}
.platform.on{background:var(--glow);}
.platform.on .plat-check{background:var(--bl);border-color:var(--bl);color:#fff;}
.plat-check{position:absolute;top:10px;right:10px;width:16px;height:16px;border-radius:5px;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .2s;}
.plat-name{font-size:12px;font-weight:600;color:var(--th);margin-bottom:4px;}
.plat-npa{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;}
.npa-tag{font-size:7.5px;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(124,166,238,.06);border:1px solid rgba(124,166,238,.12);color:var(--bl);}
.plat-desc{font-size:9px;color:var(--t3);line-height:1.45;margin-top:4px;}

/* ═══ AUTO MATRIX ═══ */
.matrix-wrap{overflow-x:auto;margin-top:16px;}
.matrix{width:100%;border-collapse:separate;border-spacing:0;font-size:10px;}
.matrix th{padding:8px 6px;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);text-align:center;border-bottom:1.5px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:2;}
.matrix th:first-child{text-align:left;min-width:160px;}
.matrix td{padding:7px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.02);transition:background .12s;}
.matrix td:first-child{text-align:left;font-weight:500;color:var(--t);}
.matrix tr:hover td{background:var(--sf);}
.matrix .cls-header td{font-weight:600;color:var(--th);font-size:11px;border-top:1.5px solid var(--bd);padding-top:10px;background:var(--ib);}
.mx-icon{font-size:12px;}
.mx-diff td{background:rgba(124,166,238,0.015);}

/* ═══ SOURCES ═══ */
.source-list{display:flex;flex-direction:column;gap:6px;}
.source{padding:14px 16px;border-radius:14px;background:var(--ib);border:1px solid var(--bd);display:flex;align-items:center;gap:14px;transition:all .2s;}
.source:hover{border-color:var(--bh);background:var(--sf);}
.source-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--sf);border:1px solid var(--bd);color:var(--t2);}
.source-n{font-size:11.5px;font-weight:600;color:var(--th);}
.source-d{font-size:9.5px;color:var(--t3);margin-top:2px;}
.source-toggle{width:36px;height:20px;border-radius:10px;border:1.5px solid var(--bd);cursor:pointer;position:relative;transition:all .25s;flex-shrink:0;}
.source-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:7px;background:var(--t3);transition:all .25s;}
.source-toggle.on{background:rgba(48,216,156,.15);border-color:rgba(48,216,156,.3);}
.source-toggle.on::after{left:18px;background:var(--gr);}

/* ═══ SUMMARY ═══ */
.summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:20px;}
.sum-card{padding:18px;border-radius:14px;background:var(--sf);border:1px solid var(--bd);text-align:center;}
.sum-val{font-size:24px;font-weight:700;color:var(--th);letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;}
.sum-label{font-size:9px;color:var(--t3);margin-top:6px;text-transform:uppercase;letter-spacing:.8px;}

/* ═══ BUTTONS ═══ */
.btn{padding:9px 18px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:inherit;}
.btn:hover{border-color:var(--bh);color:var(--t);background:var(--sfh);}
.btn-p{background:var(--glow);border-color:rgba(124,166,238,0.12);color:var(--bl);}
.btn-p:hover{background:rgba(124,166,238,0.1);}
.btn-g{background:rgba(48,216,156,0.06);border-color:rgba(48,216,156,0.14);color:var(--gr);}
.btn-lg{padding:12px 28px;font-size:12px;font-weight:600;}

.row{display:flex;gap:14px;}.row>*{flex:1;}

/* ═══ ARCHIVE NOTE ═══ */
.archive-note{padding:14px 18px;border-radius:12px;background:rgba(64,200,220,.04);border:1px solid rgba(64,200,220,.1);font-size:10.5px;color:var(--t2);line-height:1.6;margin-top:10px;display:none;}
.archive-note.visible{display:block;}
.archive-note strong{color:var(--cy);}

::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.1);border-radius:2px;}
</style>
</head>

// ═══ RUSSIAN PLURALIZATION ═══
function plural(n, one, two, five) {
  const abs = Math.abs(n) % 100;
  const last = abs % 10;
  if (abs >= 11 && abs <= 19) return five;
  if (last === 1) return one;
  if (last >= 2 && last <= 4) return two;
  return five;
}

function pTypes(n) { return n + ' ' + plural(n, 'тип контента', 'типа контента', 'типов контента'); }
function pPlatforms(n) { return n + ' ' + plural(n, 'платформа', 'платформы', 'платформ'); }
function pUsers(n) { return n + ' ' + plural(n, 'пользователь', 'пользователя', 'пользователей'); }
function pSources(n) { return n + ' ' + plural(n, 'источник', 'источника', 'источников'); }

function renderPage(){

  let stepsHtml = '<div class="steps">';
  STEPS.forEach((s,i) => {
    if(i > 0) stepsHtml += '<div class="step-line"></div>';
    const cls = i === curStep ? 'on' : i < curStep ? 'done' : '';
    stepsHtml += `<div class="step ${cls}" onclick="goStep(${i})"><div class="step-num">${i < curStep ? '✓' : i+1}</div><div class="step-info"><div class="step-name">${s.n}</div><div class="step-desc">${s.d}</div></div></div>`;
  });
  stepsHtml += '</div>';

  let content = '';
  
  if(curStep === 0) content = renderSegment();
  else if(curStep === 1) content = renderContent();
  else if(curStep === 2) content = renderPlatforms();
  else if(curStep === 3) content = renderSources();
  else if(curStep === 4) content = renderTeam();

  pg.innerHTML = stepsHtml + content + renderNavButtons();
}

function renderMatrix(){
  const types = CT.filter(t => state.contentTypes.includes(t.id));
  if(!types.length) return '<div style="padding:20px;text-align:center;color:var(--t3)">Выберите типы контента</div>';

  let html = '<div class="matrix-wrap"><table class="matrix"><thead><tr><th>Подкласс</th>';
  types.forEach(t => html += `<th style="color:${t.c}">${t.sym} ${t.n}</th>`);
  html += '</tr></thead><tbody>';

  CLASSES.forEach(cls => {
    html += `<tr class="cls-header"><td colspan="${types.length+1}">${cls.id} · ${cls.n}</td></tr>`;
    cls.subs.forEach(sub => {
      const vals = types.map(t => sub.m[t.id] || 'na');
      const hasDiff = new Set(vals).size > 1;
      html += `<tr class="${hasDiff?'mx-diff':''}"><td style="padding-left:16px;font-size:10px"><span style="color:var(--bl);font-family:monospace;font-weight:600;margin-right:4px">${sub.id}</span>${sub.n}</td>`;
      vals.forEach(v => {
        html += `<td><span class="mx-icon" style="color:${ST_COLORS[v]};opacity:${v==='na'?.3:1}">${ST_ICONS[v]}</span></td>`;
      });
      html += '</tr>';
    });
  });

  html += '</tbody></table></div>';
  return html;
}

        </div>
      `).join('')}
    </div>

    <div style="font-size:11px;font-weight:600;color:var(--th);margin-bottom:10px">${pUsers(TEAM_DATA.length)}</div>
    <div class="source-list">
      ${TEAM_DATA.map(u => {
        const userRoles = u.roles.map(rid => {
          const r = roles.find(x=>x.id===rid);
          return r ? `<span style="font-size:8px;font-weight:600;padding:2px 7px;border-radius:6px;background:${r.c}10;border:1px solid ${r.c}22;color:${r.c}">${r.n}</span>` : '';
        }).join(' ');
        return `<div class="source">
          <div class="source-ico" style="background:linear-gradient(135deg,var(--bl),var(--pp));border:none;color:#fff;font-size:9px;font-weight:700">${u.n.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div style="flex:1">
            <div class="source-n">${u.n}</div>
            <div class="source-d">${u.email}</div>
            <div style="display:flex;gap:4px;margin-top:5px">${userRoles}</div>
          </div>
          <button class="btn" style="font-size:10px;padding:5px 10px" onclick="alert('Редактирование ролей: ${u.n}')">Роли</button>
        </div>`;
      }).join('')}
    </div>

    <div style="margin-top:16px;padding:18px;border-radius:14px;border:2px dashed var(--bd);text-align:center;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--bl)';this.style.background='var(--glow)'" onmouseout="this.style.borderColor='var(--bd)';this.style.background='transparent'">
      <div style="font-size:12px;font-weight:600;color:var(--th);margin-bottom:3px">+ Добавить сотрудника</div>
      <div style="font-size:10px;color:var(--t3)">Укажите email, ФИО и назначьте одну или несколько ролей</div>
    </div>
  </div>`;
}

// ═══ ACTIONS ═══
function setSeg(id){
  state.segment=id;
  state.contentTypes=[...(SEGMENT_CT[id]||[])];
  state.platforms=[...(SEGMENT_PL[id]||[])];
  render();
}
function toggleCT(id){
  const i=state.contentTypes.indexOf(id);
  if(i>-1)state.contentTypes.splice(i,1);else state.contentTypes.push(id);
  render();
}
function togglePlatform(id){
  const i=state.platforms.indexOf(id);
  if(i>-1&&state.platforms.length>1)state.platforms.splice(i,1);else if(i===-1)state.platforms.push(id);
  render();
}
function toggleSource(id){
  const s=state.sources.find(x=>x.id===id);
  if(s)s.on=!s.on;
  render();
}
function goStep(n){curStep=n;render();}
function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  document.body.setAttribute('data-theme',theme);
  document.getElementById('themeBtn').textContent=theme==='dark'?'◐':'◑';
}

render();
</script>
</body>
</html>
