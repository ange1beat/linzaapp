name: Setup Labels
on:
  workflow_dispatch:

jobs:
  create-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Create all labels
        run: |
          # Type labels
          gh label create "type: bug"         --repo "$REPO" --color "d73a4a" --description "Баг" --force
          gh label create "type: feature"     --repo "$REPO" --color "0075ca" --description "Новая функциональность" --force
          gh label create "type: enhancement" --repo "$REPO" --color "a2eeef" --description "Улучшение существующего" --force
          gh label create "type: docs"        --repo "$REPO" --color "0e8a16" --description "Документация" --force
          gh label create "type: refactor"    --repo "$REPO" --color "d4c5f9" --description "Рефакторинг" --force
          gh label create "type: devops"      --repo "$REPO" --color "f9d0c4" --description "CI/CD, инфраструктура" --force
          gh label create "type: test"        --repo "$REPO" --color "bfd4f2" --description "Тестирование" --force

          # Priority labels
          gh label create "priority: critical" --repo "$REPO" --color "b60205" --description "Блокирующий, срочно" --force
          gh label create "priority: high"     --repo "$REPO" --color "d93f0b" --description "Важный" --force
          gh label create "priority: medium"   --repo "$REPO" --color "fbca04" --description "Обычный приоритет" --force
          gh label create "priority: low"      --repo "$REPO" --color "0e8a16" --description "Может подождать" --force

          # Stage labels
          gh label create "stage: planning"    --repo "$REPO" --color "c2e0c6" --description "Проработка плана" --force
          gh label create "stage: in-progress" --repo "$REPO" --color "1d76db" --description "В работе" --force
          gh label create "stage: review"      --repo "$REPO" --color "5319e7" --description "На ревью" --force
          gh label create "stage: testing"     --repo "$REPO" --color "f9d0c4" --description "Тестирование/QA" --force
          gh label create "stage: blocked"     --repo "$REPO" --color "e4e669" --description "Заблокировано" --force

          # Scope labels
          gh label create "scope: frontend" --repo "$REPO" --color "7057ff" --description "Фронтенд" --force
          gh label create "scope: backend"  --repo "$REPO" --color "008672" --description "Бэкенд" --force
          gh label create "scope: infra"    --repo "$REPO" --color "e36209" --description "Инфраструктура" --force

          # Service labels
          gh label create "service: board"      --repo "$REPO" --color "0A6FFF" --description "linza-board" --force
          gh label create "service: storage"    --repo "$REPO" --color "14B8A6" --description "linza-storage-service" --force
          gh label create "service: analytics"  --repo "$REPO" --color "F87171" --description "linza-analytics" --force
          gh label create "service: vpleer"     --repo "$REPO" --color "FBBF24" --description "linza-vpleer" --force
          gh label create "service: debug"      --repo "$REPO" --color "34D399" --description "linza-debug" --force
          gh label create "service: deploy"     --repo "$REPO" --color "94A3B8" --description "linza-deploy" --force
          gh label create "service: cross-repo" --repo "$REPO" --color "c5def5" --description "Затрагивает несколько сервисов" --force

          echo "✅ All 25 labels created successfully!"

      - name: Create milestones
        run: |
          gh api repos/$REPO/milestones -f title="v0.1 - Infrastructure" -f due_on="2026-04-30T23:59:59Z" -f description="CI/CD, трекинг задач, настройка окружения" || true
          gh api repos/$REPO/milestones -f title="v0.2 - Core Stability" -f due_on="2026-05-31T23:59:59Z" -f description="Баг-фиксы, покрытие тестами" || true
          gh api repos/$REPO/milestones -f title="v0.3 - Feature Complete" -f due_on="2026-06-30T23:59:59Z" -f description="Все запланированные фичи" || true
          gh api repos/$REPO/milestones -f title="v0.4 - Polish & Release" -f due_on="2026-07-31T23:59:59Z" -f description="Полировка UI, документация, релиз" || true

          echo "✅ All 4 milestones created successfully!"
