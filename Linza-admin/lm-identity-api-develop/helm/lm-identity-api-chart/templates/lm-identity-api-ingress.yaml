apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /v1/$1$2
  name: identity-api-ingress
spec:
  rules:
  - host: k8s-node2
    http:
      paths:
      - path: /api/v1/(auth)(.*)
        pathType: Prefix
        backend:
          service:
            name: lm-identity-api-service
            port:
              number: 80
      - path: /api/v1/(users)(.*)
        pathType: Prefix
        backend:
          service:
            name: lm-identity-api-service
            port:
              number: 80
      - path: /api/v1/(tenants)(.*)
        pathType: Prefix
        backend:
          service:
            name: lm-identity-api-service
            port:
              number: 80
              