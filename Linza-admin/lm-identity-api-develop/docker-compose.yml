version: "3.9"
services:
  linza-identity-api:
    networks:
      - default
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - identity-data
    ports:
      - 80:8080
      - 443:443
    environment:
      # Set environment [Production|Staging] Production - default if not set
      - ASPNETCORE_ENVIRONMENT=Development
      - LOG_LEVEL=Debug
      - REGISTRATION_LINK=""
      - SMTP_DOMAIN=mail.majormail.ru
      - SMTP_PORT=465
      - SMTP_LOGIN=noreply@mail.squadready.it
      - SMTP_PASSWORD=953Nq2Lg
      - POSTGRES_HOST=identity-data
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_DB=identity
      - POSTGRES_PASSWORT=123456

  identity-data:
    container_name: postgres
    image: postgres:latest
    volumes:
      - core-identity-db:/tmp/identity.bak
    environment:
      POSTGRES_DB: "identity"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
    ports:
      - 13003:5432
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - default
  # restore:
      # image: postgres:latest
      # command: ["bash", "-c", "sleep 5 && pg_restore -v --no-owner --host=localhost --port=13003 --username=postgres --dbname=identity /tmp/identity.bak && echo 'Restore completed'"]
      # depends_on:
      #   - identity-data
      # volumes_from:
      #   - identity-data
      # environment:
      #   POSTGRES_PASSWORD: 123456
volumes:
  core-identity-db:
