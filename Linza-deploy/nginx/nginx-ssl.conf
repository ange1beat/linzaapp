# =============================================================================
#  Nginx HTTPS/TLS конфигурация для docker-compose режима Linza Detector
#
#  SSL-версия nginx.conf. Используйте вместо nginx.conf для HTTPS режима.
#  См. docs/ssl-setup.md для инструкций по настройке сертификатов.
#
#  Маршруты:
#    /api/files, /api/config    -> storage-service    (:8001)
#    /api/classifier            -> analytics-service   (:8002)
#    /api/vpleer                -> vpleer-service      (:8003)
#    /api/tests, /api/dashboard -> error-tracker       (:8004)
#    / (all other)              -> linza-board          (:8000)
#
#  /api/errors served by linza-board (built-in errors router),
#  board forwards errors to error-tracker via ERROR_TRACKER_URL.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # -- Upstreams (service names from docker-compose.yml) --
    upstream board {
        server linza-board:8000;
    }

    upstream storage {
        server storage-service:8001;
    }

    upstream analytics {
        server analytics-service:8002;
    }

    upstream vpleer {
        server vpleer-service:8003;
    }

    upstream error_tracker {
        server error-tracker:8004;
    }

    # -- HTTP -> HTTPS redirect --
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -- HTTPS server --
    server {
        listen 443 ssl http2;
        server_name _;

        # -- SSL certificates --
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # -- Modern TLS settings --
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        # -- HSTS (1 year, include subdomains) --
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # -- OCSP Stapling --
        ssl_stapling on;
        ssl_stapling_verify on;

        # -- Session settings --
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        client_max_body_size 10G;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # -- Storage Service API --
        location /api/files {
            proxy_pass http://storage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # -- Storage Config API --
        location /api/config {
            proxy_pass http://storage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # -- Analytics Service API --
        location /api/classifier {
            proxy_pass http://analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # -- VPleer Service API --
        location /api/vpleer {
            proxy_pass http://vpleer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;

            # Video streaming / Range requests
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # -- Error Tracker internal API --
        location /api/tests {
            proxy_pass http://error_tracker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        location /api/dashboard {
            proxy_pass http://error_tracker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # Board API: analysis queue
        location /api/analysis-queue {
            proxy_pass http://board;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # -- Board: Auth + Errors + SPA (fallback) --
        # /api/errors served by board (built-in errors API)
        location / {
            proxy_pass http://board;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
        }
    }
}
