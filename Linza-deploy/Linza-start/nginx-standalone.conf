# =============================================================================
#  Nginx конфигурация для standalone-контейнера Linza Detector
#
#  Все сервисы работают на localhost внутри одного контейнера.
#  Nginx служит API Gateway, маршрутизируя запросы к соответствующим сервисам.
#
#  Маршруты:
#    /api/files, /api/config   → storage-service   (:8001)
#    /api/classifier           → analytics-service  (:8002)
#    /api/vpleer               → vpleer-service     (:8003)
#    /api/tests, /api/dashboard → error-tracker     (:8004)
#    / (всё остальное)         → board (UI + Auth + Errors API) (:8000)
#
#  Важно: /api/errors обслуживается board (встроенный errors API),
#  а не error-tracker. Board сохраняет ошибки в локальную БД
#  и пересылает их в error-tracker через ERROR_TRACKER_URL.
# =============================================================================

worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/linza/nginx-error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/linza/nginx-access.log;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Upstreams (все на localhost внутри одного контейнера) ───────────
    upstream board {
        server 127.0.0.1:8000;
    }

    upstream storage {
        server 127.0.0.1:8001;
    }

    upstream analytics {
        server 127.0.0.1:8002;
    }

    upstream vpleer {
        server 127.0.0.1:8003;
    }

    upstream error_tracker {
        server 127.0.0.1:8004;
    }

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 10G;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_connect_timeout 10s;

        # ── Storage Service API ──────────────────────────────────────
        location /api/files {
            proxy_pass http://storage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # ── Storage Config API (hot-reload S3 credentials) ──────────
        location /api/config {
            proxy_pass http://storage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # ── Analytics Service API ────────────────────────────────────
        location /api/classifier {
            proxy_pass http://analytics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # ── VPleer Service API ───────────────────────────────────────
        location /api/vpleer {
            proxy_pass http://vpleer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;

            # Video streaming / Range requests support
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # ── Error Tracker внутренние API (тесты, дашборд) ─────────
        location /api/tests {
            proxy_pass http://error_tracker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        location /api/dashboard {
            proxy_pass http://error_tracker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # ── Board API: очередь на анализ ─────────────────────────────
        location /api/analysis-queue {
            proxy_pass http://board;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # ── Board: Auth API + Errors API + Vue.js SPA (fallback) ─────
        # /api/errors обслуживается board (встроенный errors router),
        # board пересылает ошибки в error-tracker через ERROR_TRACKER_URL.
        location / {
            proxy_pass http://board;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }
    }
}
