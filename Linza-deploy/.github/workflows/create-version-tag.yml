# Ручной запуск: создаёт и пушит git-тег только в репозитории Linza-deploy.
# Остальные сервисы на сервере при деплое подтягиваются по тому же тегу, если он есть, иначе — main.
# Требуется: Settings → Actions → General → Workflow permissions → Read and write.

name: Create version tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (1.2.3 или v1.2.3)'
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          set -euo pipefail
          V="${{ github.event.inputs.version }}"
          V="${V#v}"
          TAG="v${V}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG уже существует"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Pushed $TAG"
