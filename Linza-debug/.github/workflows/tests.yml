name: Lint
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r error-tracker/requirements.txt
          pip install ruff
      - name: Lint
        run: ruff check error-tracker/
      - name: Test
        run: cd error-tracker && python -m pytest tests/ -v
