let cr='operator',cp='results',cf=null,cd=0,th='dark',oF=null,dragId=null;

function sidebar(){
  const nav=cr==='operator'?[{s:'Рабочий процесс',i:[{id:'files',nm:'Загруженные файлы'},{id:'queue',nm:'Очередь анализа'},{id:'results',nm:'Результаты анализа'}]}]:[{s:'Compliance',i:[{id:'review',nm:'На рассмотрении',cnt:DD.filter(d=>d.tl==='y').length||null},{id:'reports',nm:'Отчёты'}]}];

  const names={files:'Загруженные файлы',queue:'Очередь анализа',results:'Результаты анализа',review:'На рассмотрении',reports:'Отчёты'};

}

  const ff=F.filter(f=>f.st==='queue');
  return `<div class="pg-hdr"><div class="pg-title">Загруженные файлы</div><button class="btn btn-p">+ Добавить</button></div>`+
    (ff.length?`<div class="tw"><table><thead><tr><th>Файл</th><th>Источник</th><th>Размер</th><th>Профиль проверки</th><th>Действия</th></tr></thead><tbody>${ff.map(f=>`<tr><td class="fn"><span class="fi">▶</span>${f.nm}</td><td style="color:var(--t3)">${f.src}</td><td>${f.sz}</td><td><select style="background:var(--ib);border:1px solid var(--bd);border-radius:7px;padding:4px 8px;font-size:9.5px;color:var(--t);font-family:inherit;cursor:pointer" onchange="F.find(x=>x.id===${f.id}).model=this.value">${MODELS.map(m=>`<option value="${m.id}"${f.model===m.id?' selected':''}>${m.ico} ${m.nm}</option>`).join('')}</select></td><td><div class="ag"><div class="ab" title="Запустить анализ" onclick="startAnalysis(${f.id})" style="background:var(--glow);border-color:var(--ba);color:var(--bl)">▶</div><div class="ab" title="Удалить">✕</div></div></td></tr>`).join('')}</tbody></table></div>`:'<div style="padding:40px;text-align:center;color:var(--t3)">Нет файлов</div>');
}

function pageQueue(){
  const q=F.filter(f=>f.st==='analyzing').sort((a,b)=>b.prog-a.prog);
  const w=F.filter(f=>f.st==='queue');
  const d=F.filter(f=>f.st==='done');
  let h=`<div class="pg-hdr"><div class="pg-title">Очередь анализа</div></div>`;
  if(q.length||w.length){
    h+=`<div style="font-size:11px;font-weight:600;color:var(--th);margin-bottom:8px">В обработке</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:24px">`;
    h+=q.map(f=>{
      const m=MODELS.find(x=>x.id===f.model);
      return `<div draggable="true" ondragstart="dragId=${f.id}" ondragover="event.preventDefault()" ondrop="event.preventDefault();reorder(${f.id})" style="padding:14px 18px;border-radius:12px;background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;gap:14px;cursor:grab"><div style="font-size:10px;color:var(--t3);cursor:grab" title="Перетащите">☰</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--th);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.nm}</div><div style="font-size:9.5px;color:var(--t3);margin-top:3px">${m?m.ico+' '+m.nm:'—'} · ${f.ty}</div></div><div style="width:120px"><div style="height:4px;border-radius:2px;background:var(--ib);overflow:hidden"><div style="height:100%;width:${f.prog}%;background:var(--bl);border-radius:2px"></div></div><div style="display:flex;justify-content:space-between;margin-top:3px;font-size:9px"><span style="color:var(--bl);font-weight:600">${f.prog}%</span><span style="color:var(--t3)">~${Math.max(1,Math.round((100-f.prog)/10))}м</span></div></div><div class="ag"><div class="ab" title="Перезапустить">↻</div><div class="ab" title="Убрать">✕</div></div></div>`;
    }).join('');
    h+=w.map((f,i)=>`<div style="padding:14px 18px;border-radius:12px;background:var(--ib);border:1px solid var(--bd);display:flex;align-items:center;gap:14px;opacity:.6"><div style="font-size:10px;color:var(--t3)">${q.length+i+1}</div><div style="flex:1"><div style="font-size:12px;font-weight:500;color:var(--t)">${f.nm}</div><div style="font-size:9.5px;color:var(--t3);margin-top:2px">В очереди</div></div><div class="ag"><div class="ab" title="Убрать">✕</div></div></div>`).join('');
    h+=`</div>`;
  }
  if(d.length){
    h+=`<div style="font-size:11px;font-weight:600;color:var(--th);margin-bottom:8px">Готово</div><div class="tw"><table><thead><tr><th>Файл</th><th>Профиль</th><th>AI-заключение</th><th>Проверка</th><th>Действия</th></tr></thead><tbody>`;
    h+=d.map(f=>{
      const m=MODELS.find(x=>x.id===f.model);
      const mk=MI[f.aim]||MI['ok'];
      return `<tr><td class="fn"><span class="fi">▶</span>${f.nm}</td><td style="font-size:10px;color:var(--t2)">${m?m.ico+' '+m.nm:'—'}</td><td><span class="badge ${mk.c}" title="${f.aid||''}">${mk.i} ${mk.l}</span></td><td>${f.rev?'<span class="badge b-ok">Проверено ✓</span>':'<span class="badge" style="background:rgba(212,184,56,.05);border:1px solid rgba(212,184,56,.1);color:var(--yl)">На проверку</span>'}</td><td><div class="ag"><div class="ab" title="Просмотр отчёта" onclick="openPlayer(${f.id})">👁</div><div class="ab" title="Перезапустить">↻</div><div class="ab" title="Сохранить" onclick="showSave(event)">↓</div></div></td></tr>`;
    }).join('');
    h+=`</tbody></table></div>`;
  }
  h+=`<div id="smenu" style="display:none;position:fixed;z-index:200;background:var(--bg2);border:1px solid var(--bh);border-radius:10px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.2);min-width:150px"><div style="padding:6px 12px;font-size:10px;font-weight:600;color:var(--th);border-bottom:1px solid var(--bd);margin-bottom:4px">Сохранить отчёт</div><div onclick="hideSave()" style="padding:5px 12px;font-size:10px;color:var(--t);cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--sf)'" onmouseout="this.style.background=''">📄 PDF</div><div onclick="hideSave()" style="padding:5px 12px;font-size:10px;color:var(--t);cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--sf)'" onmouseout="this.style.background=''">📊 Excel</div><div onclick="hideSave()" style="padding:5px 12px;font-size:10px;color:var(--t);cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--sf)'" onmouseout="this.style.background=''">🔗 Ссылка</div></div>`;
  return h;
}

function pageResults(){
  const ff=F.filter(f=>f.st==='done');
  let h=`<div class="pg-hdr"><div class="pg-title">Результаты анализа</div></div><div class="tw"><table><thead><tr><th>Файл</th><th>Профиль</th><th>Длительность</th><th>AI-заключение</th><th>Проверка</th><th>Действия</th></tr></thead><tbody>`;
  h+=ff.map(f=>{
    const ds=DD.filter(d=>d.fi===f.id);
    const yl=ds.filter(d=>d.tl==='y').length;
    const m=MODELS.find(x=>x.id===f.model);
    const mk=MI[f.aim]||MI['ok'];
    return `<tr><td class="fn"><span class="fi">▶</span>${f.nm}</td><td style="font-size:10px;color:var(--t2)">${m?m.ico+' '+m.nm:'—'}</td><td>${f.dur}</td><td><span class="badge ${mk.c}" style="cursor:help" title="${f.aid||''}">${mk.i} ${mk.l}</span>${yl?` <span style="font-size:8px;color:var(--yl)">🟡${yl}</span>`:''}</td><td>${f.rev?'<span class="badge b-ok">Проверено ✓</span>':'<span class="badge" style="background:rgba(212,184,56,.05);border:1px solid rgba(212,184,56,.1);color:var(--yl)">На проверку</span>'}</td><td><div class="ag"><div class="ab" title="Просмотр отчёта" onclick="openPlayer(${f.id})">👁</div><div class="ab" title="Перезапустить">↻</div><div class="ab" title="Сохранить отчёт" onclick="showSave(event)">↓</div></div></td></tr>`;
  }).join('');
  h+=`</tbody></table></div><div id="smenu" style="display:none;position:fixed;z-index:200;background:var(--bg2);border:1px solid var(--bh);border-radius:10px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.2);min-width:150px"><div style="padding:6px 12px;font-size:10px;font-weight:600;color:var(--th);border-bottom:1px solid var(--bd);margin-bottom:4px">Сохранить</div><div onclick="hideSave()" style="padding:5px 12px;font-size:10px;color:var(--t);cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--sf)'" onmouseout="this.style.background=''">📄 PDF</div><div onclick="hideSave()" style="padding:5px 12px;font-size:10px;color:var(--t);cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--sf)'" onmouseout="this.style.background=''">📊 Excel</div><div onclick="hideSave()" style="padding:5px 12px;font-size:10px;color:var(--t);cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--sf)'" onmouseout="this.style.background=''">🔗 Ссылка</div></div>`;
  return h;
}

function pageReview(){
  const yd=DD.filter(d=>d.tl==='y');
  const fids=[...new Set(yd.map(d=>d.fi))];
  const ff=F.filter(f=>fids.includes(f.id));
  if(!ff.length) return `<div class="pg-hdr"><div class="pg-title">На рассмотрении</div></div><div class="empty"><div class="empty-ic">✓</div><div class="empty-t">Нет спорных файлов</div><div class="empty-d">Все обработано</div></div>`;
  return `<div class="pg-hdr"><div class="pg-title">На рассмотрении</div></div><div class="tw"><table><thead><tr><th>Файл</th><th>Тип</th><th>Спорных</th><th>Действия</th></tr></thead><tbody>${ff.map(f=>`<tr><td class="fn"><span class="fi">▶</span>${f.nm}</td><td>${f.ty}</td><td style="font-weight:600;color:var(--yl)">${yd.filter(d=>d.fi===f.id).length}</td><td><div class="ag"><div class="ab" onclick="openPlayerLaw(${f.id})" style="background:var(--glow);border-color:var(--ba);color:var(--bl)">▶</div></div></td></tr>`).join('')}</tbody></table></div>`;
}

function pageReports(){
  let h=`<div class="pg-hdr"><div class="pg-title">Отчёты и заключения</div></div><div style="display:flex;flex-direction:column;gap:8px">`;
  h+=FOLDERS.map(fo=>{
    const pct=Math.round(fo.done/fo.total*100);
    const isOpen=oF===fo.id;
    let inner='';
    if(isOpen){
      inner=`<div style="border-top:1px solid var(--bd)"><table><thead><tr><th>Файл</th><th>Решение</th><th>Действия</th></tr></thead><tbody>${fo.files.map(fl=>{const mk=fl.v?MI[fl.v]||MI['ok']:null;return`<tr><td class="fn" style="padding:8px 14px"><span class="fi">▶</span>${fl.nm}</td><td style="padding:8px 14px">${mk?`<span class="badge ${mk.c}">${mk.i} ${mk.l}</span>`:'<span style="color:var(--t3);font-size:10px">Ожидает</span>'}</td><td style="padding:8px 14px">${fl.v?`<div class="ag"><div class="ab" title="Просмотр">👁</div><div class="ab" title="Редактировать">✎</div><div class="ab" title="PDF">↓</div></div>`:'—'}</td></tr>`;}).join('')}</tbody></table></div>`;
    }
    return `<div style="border-radius:14px;background:var(--sf);border:1px solid var(--bd);overflow:hidden"><div style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px${isOpen?';background:var(--glow)':''}" onclick="oF=oF==='${fo.id}'?null:'${fo.id}';render()"><div style="font-size:20px;opacity:.5">${isOpen?'📂':'📁'}</div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--th)">${fo.nm}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">${fo.total} файлов</div></div><div style="display:flex;align-items:center;gap:12px"><div style="text-align:center"><div style="font-size:14px;font-weight:700;color:var(--gr)">${fo.done}</div><div style="font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">Готово</div></div><div style="text-align:center"><div style="font-size:14px;font-weight:700;color:${fo.wait?'var(--yl)':'var(--t3)'}">${fo.wait}</div><div style="font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">Ожид.</div></div><div style="width:50px;height:4px;border-radius:2px;background:var(--ib);overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--gr);border-radius:2px"></div></div><div style="font-size:9px;color:var(--t3)">${pct}%</div></div><div style="font-size:10px;color:var(--t3);transition:transform .2s${isOpen?';transform:rotate(180deg)':''}">▼</div></div>${inner}</div>`;
  }).join('');
  h+=`</div>`;
  return h;
}

function renderPlayer(){
  const f=F.find(x=>x.id===cf);
  if(!f) return;
  const ds=DD.filter(d=>d.fi===f.id);
  const isL=cp==='pl';
  const role=R[cr];
  function ptc(t){ const p=t.split(':').map(Number); return p[0]*3600+p[1]*60+(p[2]||0); }
  const dur=ptc(f.dur);
  const byCls={};
  ds.forEach(d=>{ byCls[d.c]=(byCls[d.c]||0)+1; });
  const clsE=Object.entries(byCls).sort((a,b)=>b[1]-a[1]);
  const mx=clsE.length?clsE[0][1]:1;

  document.getElementById('app').innerHTML=`<div style="display:flex;flex-direction:column;height:100vh">${topbar(role,'<span style="cursor:pointer" onclick="closePlayer()">← К списку</span> <span style="opacity:.3;margin:0 3px">›</span> <b>'+f.nm+'</b> <span class="badge b-w" style="margin-left:6px">'+f.dur+'</span>')}<div class="pv"><div class="pm">
    <div class="pvid"><div class="pvid-ph"><div class="pvid-ic">▶</div><div class="pvid-tx">${f.nm}<br>${f.dur}</div></div></div>
    <div class="ptl"><div class="ptl-f"></div><div class="ptl-m">${ds.map(d=>{const p=ptc(d.tc)/dur*100;const col=d.tl==='g'?'var(--gr)':d.tl==='y'?'var(--yl)':'var(--rd)';return`<div class="mk" style="left:${p}%;background:${col}" title="${d.tc} ${d.s} ${d.n}"></div>`;}).join('')}</div></div>
    <div class="pc"><div class="pcb">-5s</div><div class="pcb">+5s</div><div style="width:1px;height:14px;background:var(--bd)"></div><div class="pcb">0.25x</div><div class="pcb">0.5x</div><div class="pcb on">1x</div><div class="pcb">1.5x</div><div class="pcb">2x</div><div style="width:1px;height:14px;background:var(--bd)"></div><div class="pcb">Скачать</div><div class="pcb">Превью</div></div>
    <div style="padding:16px 18px;border-bottom:1px solid var(--bd)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <div style="padding:4px 10px;border-radius:7px;background:rgba(44,212,148,.06);border:1px solid rgba(44,212,148,.1);font-size:9px;font-weight:600;color:var(--gr)">📺 Федеральный ТВ</div>
        <div style="padding:4px 10px;border-radius:7px;background:rgba(140,124,208,.06);border:1px solid rgba(140,124,208,.1);font-size:9px;font-weight:600;color:var(--pp)">◆ Худож. кино</div>
        <div style="padding:4px 10px;border-radius:7px;background:var(--ib);border:1px solid var(--bd);font-size:9px;color:var(--t2)">Модель v2.4</div>
        <div style="margin-left:auto;font-size:9px;color:var(--bl);cursor:pointer;text-decoration:underline" onclick="showHelp()">Требования профиля ⓘ</div>
      </div>
      <div style="font-size:10.5px;font-weight:600;color:var(--th);margin-bottom:10px">Статистика · ${ds.length} детекций</div>
      <div style="display:flex;flex-direction:column;gap:5px">${clsE.map(([c,ct])=>{const cc=CC[c]||CC['К1'];return`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:9.5px;color:var(--t2);min-width:80px">${c} ${CN[c]||''}</div><div style="flex:1;height:4px;border-radius:2px;background:var(--ib);overflow:hidden"><div style="height:100%;width:${ct/mx*100}%;background:${cc.c};border-radius:2px"></div></div><div style="font-size:10px;font-weight:600;color:var(--th);min-width:20px;text-align:right">${ct}</div></div>`;}).join('')}</div>
      ${ds.length===0?'<div style="font-size:10.5px;color:var(--gr);margin-top:8px">Нарушений не обнаружено ✓</div>':''}
    </div>
  </div><div class="dp">
    <div class="dh"><div class="dt-t">Детекции</div><div class="dc" style="background:${ds.length>0?'var(--rd)':'var(--gr)'}">${ds.length}</div></div>
    <div class="dn"><div class="dnb">◄</div><div style="flex:1;text-align:center">${ds.length?cd+1+'/'+ds.length:'—'}</div><div class="dnb">►</div><select style="background:var(--ib);border:1px solid var(--bd);border-radius:5px;padding:2px 6px;font-size:8px;color:var(--t2);font-family:inherit"><option>По времени</option><option>По классу</option></select></div>
    <div class="df"><div class="dfb on">Все</div><div class="dfb">К1</div><div class="dfb">К2</div><div class="dfb">К3</div><div class="dfb">К4</div></div>
    <div class="dl">${ds.map((d,i)=>{const cc=CC[d.c]||CC['К1'];return`<div class="det${i===cd?' act':''}" onclick="cd=${i};render()"><div class="det-top"><div class="det-tc">${d.tc}</div><div class="det-cls" style="background:${cc.b};border:1px solid ${cc.d};color:${cc.c}">${d.s}</div><div class="det-nm">${d.n}</div></div><div class="tl"><div class="tlb${d.tl==='r'?' r':''}" onclick="event.stopPropagation();setTL(${d.id},'r')" title="Нарушение">🔴</div><div class="tlb${d.tl==='y'?' y':''}" onclick="event.stopPropagation();setTL(${d.id},'y')" title="На рассмотрение">🟡</div><div class="tlb${d.tl==='g'?' g':''}" onclick="event.stopPropagation();setTL(${d.id},'g')" title="Одобрено">🟢</div></div></div>`;}).join('')}</div>
    ${isL?`<div class="npa-p"><strong>Применимые НПА:</strong><div style="margin-top:3px"><span class="npa-t">436-ФЗ</span><span class="npa-t">КоАП 14.3.1</span></div></div><div class="dec"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-size:10.5px;font-weight:600;color:var(--th)">Заключение</div><div style="font-size:8px;padding:2px 8px;border-radius:5px;background:rgba(104,152,232,.06);border:1px solid rgba(104,152,232,.1);color:var(--bl)">AI · можно редактировать</div></div><textarea class="dec-ta" style="min-height:80px">Выявлено ${ds.length} детекций.\n${clsE.map(([c,ct])=>CN[c]+': '+ct).join(', ')}.\n\nРекомендация: маркировка 18+ (436-ФЗ ст.5).\nДисклеймер Минздрава для сцен курения.</textarea><div class="dec-btns"><button class="btn btn-g">✓ Допустить</button><button class="btn btn-y">↻ Доработка</button><button class="btn btn-r">✕ Блокировать</button><button class="btn" style="margin-left:auto">📄 PDF</button></div></div>`:`<div class="esc"><button class="btn btn-y" style="width:100%;justify-content:center" onclick="escalate()">🟡 На правовую оценку (${ds.filter(d=>d.tl==='y').length})</button></div>`}
  </div></div></div>`;
}

// Actions
function setTL(id,v){ const d=DD.find(x=>x.id===id); if(d) d.tl=d.tl===v?null:v; render(); }
function openPlayer(id){ cf=id; cp='player'; cd=0; render(); }
function openPlayerLaw(id){ cf=id; cp='pl'; cd=0; render(); }
function closePlayer(){ cf=null; cp=cr==='operator'?'results':'review'; render(); }
function startAnalysis(id){ const f=F.find(x=>x.id===id); if(f){ f.st='analyzing'; if(!f.model) f.model='fed_tv'; } cp='queue'; render(); }
function reorder(targetId){ if(dragId && dragId!==targetId){ const di=F.findIndex(x=>x.id===dragId); const ti=F.findIndex(x=>x.id===targetId); if(di>-1 && ti>-1){ const item=F.splice(di,1)[0]; F.splice(ti,0,item); } } dragId=null; render(); }
function escalate(){ alert('Спорные детекции (🟡) отправлены юристу.\nПереключитесь на роль ЮР.'); }
function switchRole(id){ cr=id; cp=id==='operator'?'results':'review'; cf=null; render(); }
function go(id){ cp=id; cf=null; render(); }
function toggleTheme(){ th=th==='dark'?'light':'dark'; document.body.setAttribute('data-theme',th); render(); }
function showSave(e){ e.stopPropagation(); const m=document.getElementById('smenu'); if(m){ m.style.display='block'; m.style.top=(e.clientY+4)+'px'; m.style.left=(e.clientX-130)+'px'; document.addEventListener('click',hideSave,{once:true}); } }
function hideSave(){ const m=document.getElementById('smenu'); if(m) m.style.display='none'; }
function showHelp(){ alert('Профиль: Федеральный ТВ-эфир\nКонтент: Худож. кино и сериалы\n\nНПА:\n• 436-ФЗ «О защите детей»\n• 38-ФЗ «О рекламе»\n• Закон о СМИ\n\nТребования:\n• Абс. запрет мата в эфире\n• Маркировка 18+ для эротики\n• Дисклеймер Минздрава для курения\n• Нац. символика — только в ИХЦ'); }

render();
</script>
</body>
</html>
