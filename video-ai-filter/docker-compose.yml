# cp .env.example .env && заполните ключи
# vLLM на хосте: VLLM_BASE_URL=http://host.docker.internal:8001/v1
# Если порт 8000 занят (локальный uvicorn): в .env задайте HOST_PORT=8080
services:
  api:
    build: .
    image: video-ai-filter:latest
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /data/uploads
      DB_PATH: /data/jobs.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - video_ai_data:/data
    restart: unless-stopped

volumes:
  video_ai_data:
