<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e131b" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef2f7" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Linza Detector — проверка контента, отчёты и портал ролей" />
  <title>Linza Detector</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('linza_theme') === 'light' ? 'light' : 'dark'
        document.documentElement.setAttribute('data-theme', t)
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark')
      }
    })()
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
