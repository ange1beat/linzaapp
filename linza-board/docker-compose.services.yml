version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linza
      POSTGRES_PASSWORD: linza_dev
      POSTGRES_DB: linza_board
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://linza:linza_dev@postgres:5432/linza_board
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      - postgres
      - redis

  license-service:
    build: ./services/license-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://linza:linza_dev@postgres:5432/linza_board
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - postgres
      - redis

  license-check:
    build: ./services/license-check
    ports:
      - "8003:8003"
    environment:
      REDIS_URL: redis://redis:6379/2
      LICENSE_SERVICE_URL: http://license-service:8002
    depends_on:
      - redis
      - license-service

volumes:
  pgdata:
