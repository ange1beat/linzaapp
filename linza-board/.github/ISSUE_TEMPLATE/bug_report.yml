name: Bug Report
description: Сообщить о баге или неожиданном поведении
labels: ["type: bug", "stage: planning"]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: textarea
    id: description
    attributes:
      label: Описание бага
      description: Чёткое описание проблемы
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Пошаговая инструкция
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Приоритет
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: service
    attributes:
      label: Затронутые сервисы
      multiple: true
      options:
        - board (port 8000)
        - storage (port 8001)
        - analytics (port 8002)
        - vpleer (port 8003)
        - debug (port 8004)
        - deploy (nginx/docker)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Логи / Вывод ошибок
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Дополнительный контекст
