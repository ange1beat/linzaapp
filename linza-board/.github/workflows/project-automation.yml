name: Project Board Automation
on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  move-card:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_NUMBER: 1
      PROJECT_OWNER: BigDataQueen
    steps:
      - name: Determine target status
        id: status
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          STATUS=""

          if [ "$EVENT" = "issues" ]; then
            if [ "$ACTION" = "opened" ]; then
              STATUS="Todo"
            elif [ "$ACTION" = "closed" ]; then
              STATUS="Done"
            elif [ "$ACTION" = "reopened" ]; then
              STATUS="In Progress"
            fi
          fi

          if [ "$EVENT" = "pull_request" ]; then
            if [ "$ACTION" = "opened" ] || [ "$ACTION" = "ready_for_review" ]; then
              STATUS="In Progress"
            elif [ "$ACTION" = "review_requested" ]; then
              STATUS="In Review"
            elif [ "$ACTION" = "closed" ]; then
              if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                STATUS="Done"
              else
                STATUS="Todo"
              fi
            fi
          fi

          if [ "$EVENT" = "pull_request_review" ]; then
            REVIEW_STATE="${{ github.event.review.state }}"
            if [ "$REVIEW_STATE" = "approved" ]; then
              STATUS="Testing"
            elif [ "$REVIEW_STATE" = "changes_requested" ]; then
              STATUS="In Progress"
            fi
          fi

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Move project item
        if: steps.status.outputs.status != ''
        run: |
          TARGET_STATUS="${{ steps.status.outputs.status }}"

          if [ "${{ github.event_name }}" = "issues" ]; then
            CONTENT_ID="${{ github.event.issue.node_id }}"
          else
            CONTENT_ID="${{ github.event.pull_request.node_id }}"
          fi

          PROJECT_ID=$(gh api graphql -f query='
            query {
              user(login: "'"$PROJECT_OWNER"'") {
                projectV2(number: '"$PROJECT_NUMBER"') {
                  id
                }
              }
            }' --jq '.data.user.projectV2.id')

          ITEM_ID=$(gh api graphql -f query='
            query {
              node(id: "'"$CONTENT_ID"'") {
                ... on Issue {
                  projectItems(first: 10) {
                    nodes { id project { id } }
                  }
                }
                ... on PullRequest {
                  projectItems(first: 10) {
                    nodes { id project { id } }
                  }
                }
              }
            }' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')

          if [ -z "$ITEM_ID" ]; then
            echo "Item not found in project, skipping"
            exit 0
          fi

          FIELD_DATA=$(gh api graphql -f query='
            query {
              node(id: "'"$PROJECT_ID"'") {
                ... on ProjectV2 {
                  field(name: "Status") {
                    ... on ProjectV2SingleSelectField {
                      id
                      options { id name }
                    }
                  }
                }
              }
            }')

          FIELD_ID=$(echo "$FIELD_DATA" | jq -r '.data.node.field.id')
          OPTION_ID=$(echo "$FIELD_DATA" | jq -r '.data.node.field.options[] | select(.name == "'"$TARGET_STATUS"'") | .id')

          if [ -z "$OPTION_ID" ] || [ "$OPTION_ID" = "null" ]; then
            echo "Status option '$TARGET_STATUS' not found in project"
            exit 0
          fi

          gh api graphql -f query='
            mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'"
                itemId: "'"$ITEM_ID"'"
                fieldId: "'"$FIELD_ID"'"
                value: { singleSelectOptionId: "'"$OPTION_ID"'" }
              }) {
                projectV2Item { id }
              }
            }'

          echo "Moved item to '$TARGET_STATUS'"
